<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英仏百年戦争：スライド</title>
    <style>
        body { background: #1a202c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .slide { background: #0c0f16; width: 900px; padding: 40px; border: 2px solid #d4af37; margin-bottom: 40px; }
        h1 { color: #d4af37; border-left: 5px solid #b22222; padding-left: 15px; }
        img { width: 100%; max-height: 400px; object-fit: contain; background: #000; margin: 20px 0; border: 1px solid #334155; }
        p { font-size: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="slide">
    <h1>英仏百年戦争</h1>
    <p style="text-align:center; font-size:24px;">国民国家の誕生：中世の終焉</p>
</div>

<div class="slide">
    <h1>1. クレシーの戦い (1346)</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Battle_of_crecy_froissart.jpg">
    <p>イングランドの長弓兵が重装騎士を圧倒。軍事革命の始まりとなった戦いです。</p>
</div>

<div class="slide">
    <h1>2. エドワード黒太子</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Edward_the_Black_Prince_1.jpg">
    <p>ポワティエの戦いでフランス王を捕虜にするなど、イングランドを勝利へ導きました。</p>
</div>

<div class="slide">
    <h1>3. 救国の聖女ジャンヌ・ダルク</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/39/Joan_of_arc_miniature_graded.jpg">
    <p>1429年、オルレアンを解放。フランス軍に勝利の確信と国家意識を与えました。</p>
</div>

<div class="slide">
    <h1>4. カスティヨンの戦い (1453)</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/11/Battle_of_Castillon.jpg">
    <p>大砲の運用によりフランスが勝利。これにより百年戦争は終結しました。</p>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英仏百年戦争：国民国家の誕生</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #1a202c; display: grid; gap: 40px; grid-template-columns: 1fr; margin: 0; min-height: 100vh; padding: 40px 0; place-items: center; }
        .slide-container { align-items: flex-start; background-color: #0c0f16; color: #f8fafc; display: flex; flex-direction: column; font-family: 'Noto Sans JP', sans-serif; height: 720px; justify-content: flex-start; overflow-y: auto; padding: 60px; position: relative; width: 1280px; border: 1px solid #d4af37; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1, h2, h3 { color: #d4af37; font-family: 'Noto Serif JP', serif; margin: 0; }
        .slide-title { border-left: 6px solid #b22222; font-size: 44px; margin-bottom: 30px; padding-left: 20px; }
        p, li { font-size: 22px; line-height: 1.6; color: #cbd5e1; }
        .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .image-wrapper { width: 100%; height: 400px; border: 1px solid #334155; overflow: hidden; background: #1a202c; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        .highlight { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>

<div class="slide-container">
    <div style="text-align: center; width: 100%; margin-top: 150px;">
        <h1 style="font-size: 80px;">英仏百年戦争</h1>
        <p style="font-size: 32px; color: #94a3b8; margin-top: 20px;">国民国家の誕生：騎士道の終焉と近代への胎動</p>
    </div>
</div>

<div class="slide-container">
    <h2 class="slide-title">軍事革命：クレシーの戦い (1346)</h2>
    <div class="two-column">
        <div>
            <p>イングランドの長弓隊が、フランスの重装騎士団を圧倒。歩兵が騎士を倒す時代の到来を告げた戦い。</p>
        </div>
        <div class="image-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Battle_of_crecy_froissart.jpg/640px-Battle_of_crecy_froissart.jpg" alt="Battle of Crecy">
        </div>
    </div>
</div>

<div class="slide-container">
    <h2 class="slide-title">伝説の指揮官：エドワード黒太子</h2>
    <div class="two-column">
        <div class="image-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Edward_the_Black_Prince_1.jpg/439px-Edward_the_Black_Prince_1.jpg" alt="Black Prince">
        </div>
        <div>
            <p>ポワティエの戦い(1356)でフランス王を捕虜にする。戦術家としての才覚でイングランドを勝利へ導いた。</p>
        </div>
    </div>
</div>

<div class="slide-container">
    <h2 class="slide-title">救国の聖女：ジャンヌ・ダルク</h2>
    <div class="two-column">
        <div>
            <p>1429年、オルレアンを解放。絶望的な状況のフランス軍に「勝利の確信」と「国民の意識」を呼び起こした。</p>
        </div>
        <div class="image-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Joan_of_arc_miniature_graded.jpg/436px-Joan_of_arc_miniature_graded.jpg" alt="Joan of Arc">
        </div>
    </div>
</div>

</body>
</html>

<div class="slide">
    <h1>英仏百年戦争</h1>
    <p style="text-align:center; font-size:24px;">国民国家の誕生：中世の終焉</p>
</div>

<div class="slide">
    <h1>1. クレシーの戦い (1346)</h1>
    <img src="https://placehold.jp/40/d4af37/ffffff/800x400.png?text=Battle%20of%20Crecy%0A(Longbow%20Victory)" style="width:100%; border:1px solid #d4af37;">
    <p>イングランドの長弓兵が重装騎士を圧倒。軍事革命の始まりとなった戦いです。</p>
</div>

<div class="slide">
    <h1>2. エドワード黒太子</h1>
    <img src="https://placehold.jp/40/d4af37/ffffff/800x400.png?text=Edward%20the%20Black%20Prince" style="width:100%; border:1px solid #d4af37;">
    <p>ポワティエの戦いでフランス王を捕虜にするなど、イングランドを勝利へ導きました。</p>
</div>

<div class="slide">
    <h1>3. 救国の聖女ジャンヌ・ダルク</h1>
    <img src="https://placehold.jp/40/d4af37/ffffff/800x400.png?text=Joan%20of%20Arc%0A(Saint%20of%20France)" style="width:100%; border:1px solid #d4af37;">
    <p>1429年、オルレアンを解放。フランス軍に勝利の確信と国家意識を与えました。</p>
</div>

<div class="slide">
    <h1>4. カスティヨンの戦い (1453)</h1>
    <img src="https://placehold.jp/40/d4af37/ffffff/800x400.png?text=Battle%20of%20Castillon%0A(End%20of%20War)" style="width:100%; border:1px solid #d4af37;">
    <p>大砲の運用によりフランスが勝利。これにより百年戦争は終結しました。</p>
